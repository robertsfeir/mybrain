services:
  mybrain:
    build:
      context: ..
      dockerfile: templates/Dockerfile.bundled
    image: mybrain-bundled:latest
    container_name: mybrain_${MYBRAIN_NAME:-default}
    restart: unless-stopped
    ports:
      - "${MYBRAIN_PORT:-8787}:8787"
    volumes:
      - mybrain_pgdata:/var/lib/postgresql/data
      - mybrain_ollama_models:/root/.ollama
    environment:
      MYBRAIN_PORT: "${MYBRAIN_PORT:-8787}"
      BRAIN_SCOPE: "${BRAIN_SCOPE:-personal}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8787/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 300s
      retries: 12

volumes:
  mybrain_pgdata:
  mybrain_ollama_models:
